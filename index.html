[dir="rtl"] .toggle-switch::after { right: 2px; }
[dir="ltr"] .toggle-switch::after { left: 2px; }
.toggle-switch.on { background: #0d6efd; }
.toggle-switch.off { background: #545761; }
[dir="rtl"] .toggle-switch.on::after { transform: translateX(-20px); }
[dir="ltr"] .toggle-switch.on::after { transform: translateX(20px); }

let currentLang = 'ar';
let isDark = true;

function t(key) {
  const keys = key.split('.');
  let val = translations[currentLang];
  for (const k of keys) { val = val?.[k]; }
  return val || key;
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  document.querySelectorAll('[data-i18n-value]').forEach(el => {
    el.value = t(el.getAttribute('data-i18n-value'));
  });
  document.getElementById('langBtn').textContent = currentLang === 'ar' ? 'EN' : 'ع';
  document.getElementById('settingsLangBtn').textContent = currentLang === 'ar' ? 'العربية' : 'English';
  document.body.parentElement.lang = currentLang;
  document.body.parentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('app').style.fontFamily = currentLang === 'ar' ? "'Tajawal', sans-serif" : "'DM Sans', sans-serif";
  renderDynamicContent();
}

function toggleLang() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  applyTranslations();
}

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.classList.toggle('dark', isDark);
  const sw = document.getElementById('themeToggleSwitch');
  sw.classList.toggle('on', isDark);
  sw.classList.toggle('off', !isDark);
  lucide.createIcons();
}

// Navigation
let currentPage = 'dashboard';
function navigate(page, e) {
  if (e) e.preventDefault();
  currentPage = page;
  document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
  const target = document.getElementById('page-' + page);
  if (target) target.classList.remove('hidden');
  document.querySelectorAll('.sidebar-link').forEach(l => {
    l.classList.remove('active');
    l.classList.toggle('active', l.getAttribute('data-page') === page);
  });
  document.getElementById('pageTitle').textContent = t('nav.' + page);
  closeMobileSidebar();
}

function toggleMobileSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  const isOpen = !sb.classList.contains('-translate-x-full') && !sb.classList.contains('rtl:translate-x-full');
  if (currentLang === 'ar') {
    sb.classList.toggle('rtl:translate-x-full', isOpen);
    sb.classList.toggle('translate-x-0', !isOpen);
  } else {
    sb.classList.toggle('-translate-x-full', isOpen);
    sb.classList.toggle('translate-x-0', !isOpen);
  }
  ov.classList.toggle('hidden', isOpen);
}
function closeMobileSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  if (currentLang === 'ar') {
    sb.classList.add('rtl:translate-x-full');
    sb.classList.remove('translate-x-0');
  } else {
    sb.classList.add('-translate-x-full');
    sb.classList.remove('translate-x-0');
  }
  ov.classList.add('hidden');
}

// Modals
function openModal(id) {
  const m = document.getElementById(id);
  m.classList.remove('hidden');
  m.classList.add('flex');
  lucide.createIcons();
}
function closeModal(id) {
  const m = document.getElementById(id);
  m.classList.add('hidden');
  m.classList.remove('flex');
}
// Close modal on backdrop
document.querySelectorAll('[id$="Modal"]').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
});

// Amount adjuster
function adjustAmount(id, delta) {
  const inp = document.getElementById(id);
  let v = parseFloat(inp.value) || 0;
  v = Math.max(0, v + delta);
  inp.value = v;
}

// Toast
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.remove('hidden');
  lucide.createIcons();
  setTimeout(() => toast.classList.add('hidden'), 2500);
}

// Element SDK
const defaultConfig = {
  app_title: 'فِنتِك',
  background_color: '#0f1015',
  surface_color: '#1a1b21',
  text_color: '#e2e3e5',
  primary_action_color: '#0d6efd',
  secondary_action_color: '#545761',
  font_family: 'Tajawal',
  font_size: 14
};

function applyConfig(config) {
  const title = config.app_title || defaultConfig.app_title;
  document.getElementById('logoText').textContent = title;
  const bg = config.background_color || defaultConfig.background_color;
  const surface = config.surface_color || defaultConfig.surface_color;
  const txt = config.text_color || defaultConfig.text_color;
  const primary = config.primary_action_color || defaultConfig.primary_action_color;
  const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
  const font = config.font_family || defaultConfig.font_family;
  const size = config.font_size || defaultConfig.font_size;

  document.documentElement.style.setProperty('--bg', bg);
  document.documentElement.style.setProperty('--surface', surface);
  document.documentElement.style.setProperty('--text', txt);
  document.documentElement.style.setProperty('--primary', primary);

  document.querySelectorAll('.btn-primary').forEach(b => {
    b.style.background = `linear-gradient(135deg, ${primary} 0%, ${primary}cc 100%)`;
  });

  const appEl = document.getElementById('app');
  appEl.style.fontFamily = `${font}, Tajawal, DM Sans, sans-serif`;
  document.querySelectorAll('p,span,h1,h2,h3,td,th,label,input,textarea,select,button,a').forEach(el => {
    if (!el.closest('.btn-primary')) {
      el.style.fontFamily = `${font}, Tajawal, DM Sans, sans-serif`;
    }
  });
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => { applyConfig(config); },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
        { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
      ],
      borderables: [],
      fontEditable: {
        get: () => config.font_family || defaultConfig.font_family,
        set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => config.font_size || defaultConfig.font_size,
        set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    }),
    mapToEditPanelValues: (config) => new Map([
      ['app_title', config.app_title || defaultConfig.app_title]
    ])
  });
}
